groups:
  - name: flask-and-vm-alerts
    rules:
      - alert: FlaskAppDown
        expr: up{job="flask-app"} == 0
        for: 2m
        labels:
          severity: critical
          service: flask
        annotations:
          summary: "Flask app target is down"
          description: "Prometheus cannot scrape the Flask app /metrics endpoint."

      - alert: FlaskHealthCheckFailed
        expr: probe_success{job="blackbox-flask-health"} == 0
        for: 2m
        labels:
          severity: critical
          service: flask
        annotations:
          summary: "Flask health endpoint failed"
          description: "The /health endpoint is not returning a healthy response."

      - alert: NodeExporterDown
        expr: up{job="node_exporter"} == 0
        for: 2m
        labels:
          severity: critical
          service: vm
        annotations:
          summary: "Node exporter is down"
          description: "Prometheus cannot reach the node exporter on the VM."

      - alert: CadvisorDown
        expr: up{job="cadvisor"} == 0
        for: 2m
        labels:
          severity: warning
          service: containers
        annotations:
          summary: "cAdvisor is down"
          description: "Container metrics are no longer being scraped."

      - alert: VMCPUHigh
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          service: vm
        annotations:
          summary: "High CPU usage on the VM"
          description: "The VM CPU usage has been above 80% for 5 minutes."

      - alert: VMMemoryHigh
        expr: ((node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes) * 100 > 85
        for: 5m
        labels:
          severity: warning
          service: vm
        annotations:
          summary: "High memory usage on the VM"
          description: "The VM memory usage has been above 85% for 5 minutes."

      - alert: VMDiskHigh
        expr: ((node_filesystem_size_bytes{fstype!~"tmpfs|squashfs",mountpoint="/"} - node_filesystem_avail_bytes{fstype!~"tmpfs|squashfs",mountpoint="/"}) / node_filesystem_size_bytes{fstype!~"tmpfs|squashfs",mountpoint="/"}) * 100 > 85
        for: 5m
        labels:
          severity: warning
          service: vm
        annotations:
          summary: "Low disk space on the VM"
          description: "The root filesystem has less than 15% free space."
