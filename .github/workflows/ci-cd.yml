name: Flask DevOps Automation Mini Project

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.10"
  IMAGE_NAME: benharbfarah/ci_cd_pipeline
  PYTHONPATH: ${{ github.workspace }}
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  TF_ROOT: infra/terraform/azure
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_resource_group_name: ${{ vars.AZURE_RESOURCE_GROUP }}
  TF_VAR_vm_name: ${{ vars.AZURE_VM_NAME }}

permissions:
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest
        run: pytest -q

  monitoring-validation:
    name: Validate monitoring stack
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose file
        working-directory: ${{ github.workspace }}
        env:
          APP_IMAGE: ${{ env.IMAGE_NAME }}:latest
          GRAFANA_ADMIN_USER: admin
          GRAFANA_ADMIN_PASSWORD: ChangeMe123!
        run: docker compose -f infra/terraform/azure/monitoring/docker-compose.yml config

      - name: Validate Prometheus config
        run: |
          docker run --rm \
            --entrypoint promtool \
            -v "${{ github.workspace }}/infra/terraform/azure/monitoring/prometheus:/etc/prometheus" \
            prom/prometheus:latest \
            check config /etc/prometheus/prometheus.yml

      - name: Validate Prometheus rules
        run: |
          docker run --rm \
            --entrypoint promtool \
            -v "${{ github.workspace }}/infra/terraform/azure/monitoring/prometheus:/etc/prometheus" \
            prom/prometheus:latest \
            check rules /etc/prometheus/rules.yml

      - name: Validate Alertmanager config
        run: |
          docker run --rm \
            --entrypoint amtool \
            -v "${{ github.workspace }}/infra/terraform/azure/monitoring/alertmanager:/etc/alertmanager" \
            prom/alertmanager:latest \
            check-config /etc/alertmanager/alertmanager.yml

  build-and-push:
    name: Build and push Docker image
    needs: monitoring-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: benharbfarah
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  terraform-deploy:
    name: Deploy to Azure VM with Terraform
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, linux, x64, azure-vm]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure CLI login with managed identity
        run: |
          az login --identity
          az account set --subscription "${AZURE_SUBSCRIPTION_ID}"

      - name: Terraform fmt
        working-directory: ${{ env.TF_ROOT }}
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: ${{ env.TF_ROOT }}
        run: terraform init

      - name: Import VM extension into state if needed
        working-directory: ${{ env.TF_ROOT }}
        run: |
          if ! terraform state list | grep -q '^azurerm_virtual_machine_extension.deploy_app$'; then
            terraform import \
              azurerm_virtual_machine_extension.deploy_app \
              "/subscriptions/${AZURE_SUBSCRIPTION_ID}/resourceGroups/${TF_VAR_resource_group_name}/providers/Microsoft.Compute/virtualMachines/${TF_VAR_vm_name}/extensions/${TF_VAR_vm_name}-custom-script"
          fi

      - name: Terraform validate
        working-directory: ${{ env.TF_ROOT }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ env.TF_ROOT }}
        run: terraform plan -no-color -out=tfplan

      - name: Terraform apply
        working-directory: ${{ env.TF_ROOT }}
        run: terraform apply -auto-approve tfplan
